<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SPACE SHOOTER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    h1 {
      font-size: 1.8rem;
      letter-spacing: 8px;
      color: #0ff;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #0ff;
    }
    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 8px;
      font-size: 1rem;
      color: #aaa;
    }
    #hud span { color: #fff; }
    canvas {
      border: 2px solid #0ff;
      box-shadow: 0 0 20px #0ff4;
      display: block;
    }
    #message {
      margin-top: 12px;
      font-size: 1rem;
      color: #888;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<h1>SPACE SHOOTER</h1>
<div id="hud">
  スコア: <span id="score-disp">0</span>
  &nbsp;&nbsp;
  ライフ: <span id="life-disp">❤️❤️❤️</span>
  &nbsp;&nbsp;
  レベル: <span id="level-disp">1</span>
</div>
<canvas id="c" width="480" height="600"></canvas>
<div id="message">← → で移動 / スペースで発射</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// --- State ---
let score, lives, level, state; // state: 'play' | 'over' | 'clear' | 'start'
let player, bullets, enemies, enemyBullets, stars;
let keys = {};
let shootCooldown = 0;
let enemyShootTimer = 0;
let enemyDir = 1;
let enemyMoveTimer = 0;
let frameId;

// --- Init ---
function newGame() {
  score = 0;
  lives = 3;
  level = 1;
  state = 'play';
  player = { x: W / 2, y: H - 60, w: 36, h: 28, speed: 5 };
  bullets = [];
  enemyBullets = [];
  stars = Array.from({ length: 80 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 1.5 + 0.3,
  }));
  spawnEnemies();
  updateHUD();
}

function spawnEnemies() {
  enemies = [];
  const rows = 3 + Math.min(level - 1, 2);
  const cols = 9;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      enemies.push({
        x: 50 + c * 42,
        y: 50 + r * 40,
        w: 28, h: 20,
        type: r === 0 ? 2 : r === 1 ? 1 : 0,
      });
    }
  }
  enemyDir = 1;
  enemyMoveTimer = 0;
}

function updateHUD() {
  document.getElementById('score-disp').textContent = score;
  document.getElementById('life-disp').textContent = '❤️'.repeat(lives);
  document.getElementById('level-disp').textContent = level;
}

// --- Drawing helpers ---
function drawPlayer() {
  const { x, y, w, h } = player;
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#0f0';
  // Body
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.moveTo(x, y - h / 2);
  ctx.lineTo(x - w / 2, y + h / 2);
  ctx.lineTo(x + w / 2, y + h / 2);
  ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#8ff';
  ctx.beginPath();
  ctx.ellipse(x, y, 6, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  const colors = ['#f55', '#fa0', '#f0f'];
  ctx.fillStyle = colors[e.type];
  ctx.shadowBlur = 8;
  ctx.shadowColor = colors[e.type];
  // Body
  ctx.fillRect(e.x - e.w / 2, e.y - e.h / 2, e.w, e.h);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(e.x - 7, e.y - 5, 5, 5);
  ctx.fillRect(e.x + 2, e.y - 5, 5, 5);
  // Antennae
  ctx.strokeStyle = colors[e.type];
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(e.x - 6, e.y - e.h / 2);
  ctx.lineTo(e.x - 10, e.y - e.h / 2 - 8);
  ctx.moveTo(e.x + 6, e.y - e.h / 2);
  ctx.lineTo(e.x + 10, e.y - e.h / 2 - 8);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawBullet(b, color) {
  ctx.fillStyle = color;
  ctx.shadowBlur = 8;
  ctx.shadowColor = color;
  ctx.fillRect(b.x - 2, b.y - 8, 4, 14);
  ctx.shadowBlur = 0;
}

function drawStars() {
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.4 + s.r * 0.3})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawExplosion(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 6;
    ctx.shadowColor = color;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * 14, y + Math.sin(angle) * 14);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

// --- Update ---
function update() {
  // Move stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  if (state !== 'play') return;

  // Player movement
  if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(player.w / 2, player.x - player.speed);
  if (keys['ArrowRight'] || keys['d']) player.x = Math.min(W - player.w / 2, player.x + player.speed);

  // Shooting
  if (shootCooldown > 0) shootCooldown--;
  if ((keys[' '] || keys['ArrowUp']) && shootCooldown === 0) {
    bullets.push({ x: player.x, y: player.y - 20 });
    shootCooldown = 12;
  }

  // Move player bullets
  bullets = bullets.filter(b => b.y > -10);
  for (const b of bullets) b.y -= 9;

  // Enemy movement
  const speed = 0.6 + level * 0.25 + (1 - enemies.length / 30) * 0.8;
  enemyMoveTimer++;
  if (enemyMoveTimer > 18) {
    enemyMoveTimer = 0;
    let edgeHit = false;
    for (const e of enemies) {
      e.x += enemyDir * (speed * 6);
      if (e.x > W - 28 || e.x < 28) edgeHit = true;
    }
    if (edgeHit) {
      enemyDir *= -1;
      for (const e of enemies) e.y += 18;
    }
  }

  // Enemy shooting
  enemyShootTimer++;
  const shootInterval = Math.max(40, 90 - level * 8);
  if (enemyShootTimer > shootInterval && enemies.length > 0) {
    enemyShootTimer = 0;
    const shooter = enemies[Math.floor(Math.random() * enemies.length)];
    enemyBullets.push({ x: shooter.x, y: shooter.y + 14 });
  }

  // Move enemy bullets
  enemyBullets = enemyBullets.filter(b => b.y < H + 10);
  for (const b of enemyBullets) b.y += 4 + level * 0.4;

  // Collision: player bullets vs enemies
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const b = bullets[bi], e = enemies[ei];
      if (Math.abs(b.x - e.x) < e.w / 2 + 3 && Math.abs(b.y - e.y) < e.h / 2 + 6) {
        const pts = [100, 200, 300][e.type];
        score += pts;
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        updateHUD();
        break;
      }
    }
  }

  // Collision: enemy bullets vs player
  for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    if (Math.abs(b.x - player.x) < 16 && Math.abs(b.y - player.y) < 18) {
      enemyBullets.splice(bi, 1);
      lives--;
      updateHUD();
      if (lives <= 0) { state = 'over'; return; }
    }
  }

  // Enemies reach bottom
  for (const e of enemies) {
    if (e.y > H - 60) { state = 'over'; return; }
  }

  // All enemies cleared
  if (enemies.length === 0) {
    level++;
    bullets = [];
    enemyBullets = [];
    if (level > 5) { state = 'clear'; return; }
    spawnEnemies();
    updateHUD();
  }
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'start') {
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 2rem Courier New';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12; ctx.shadowColor = '#0ff';
    ctx.fillText('SPACE SHOOTER', W / 2, H / 2 - 40);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '1rem Courier New';
    ctx.fillText('スペースキーでスタート', W / 2, H / 2 + 10);
    ctx.fillStyle = '#888';
    ctx.font = '0.85rem Courier New';
    ctx.fillText('← → 移動  スペース 発射', W / 2, H / 2 + 45);
    return;
  }

  drawPlayer();
  for (const e of enemies) drawEnemy(e);
  for (const b of bullets) drawBullet(b, '#0f0');
  for (const b of enemyBullets) drawBullet(b, '#f44');

  if (state === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 2.5rem Courier New';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 16; ctx.shadowColor = '#f44';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '1.2rem Courier New';
    ctx.fillText(`スコア: ${score}`, W / 2, H / 2 + 20);
    ctx.fillStyle = '#888';
    ctx.font = '0.9rem Courier New';
    ctx.fillText('スペースキーでリトライ', W / 2, H / 2 + 60);
  }

  if (state === 'clear') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 2.2rem Courier New';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 16; ctx.shadowColor = '#ff0';
    ctx.fillText('🎉 CLEAR! 🎉', W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '1.2rem Courier New';
    ctx.fillText(`最終スコア: ${score}`, W / 2, H / 2 + 20);
    ctx.fillStyle = '#888';
    ctx.font = '0.9rem Courier New';
    ctx.fillText('スペースキーでもう一度', W / 2, H / 2 + 60);
  }
}

// --- Loop ---
function loop() {
  update();
  draw();
  frameId = requestAnimationFrame(loop);
}

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();

  if (e.key === ' ' && state === 'start') { newGame(); }
  else if (e.key === ' ' && (state === 'over' || state === 'clear')) { newGame(); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Start ---
state = 'start';
stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 1.5 + 0.3,
}));
loop();
</script>
</body>
</html>
